<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Frota - Concessionária Digital</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      min-height: 100vh;
    }
    .card {
      background-color: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    h1 {
      text-align: center;
      color: #0d47a1;
      margin-top: 0;
      letter-spacing: 0.5px;
    }
    .subtitulo {
      text-align: center;
      color: #777;
      margin-top: -8px;
      margin-bottom: 25px;
      font-size: 14px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus {
      outline: none;
      border-color: #1565c0;
      box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15);
    }
    #preview {
      margin-top: 12px;
      font-style: italic;
      color: #1565c0;
      background-color: #e3f2fd;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      margin-top: 22px;
      width: 100%;
      padding: 12px;
      background-color: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    button:hover {
      background-color: #0d47a1;
    }
    button:active {
      transform: scale(0.98);
    }
    h2.titulo-patio {
      margin-top: 30px;
      margin-bottom: 12px;
      color: #0d47a1;
      font-size: 18px;
      border-bottom: 2px solid #e3f2fd;
      padding-bottom: 6px;
    }
    #patio {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    #patio:empty::after {
      content: "Nenhum carro fabricado ainda. Preencha os dados acima e clique em \"Fabricar Carro\".";
      color: #999;
      font-size: 14px;
      font-style: italic;
    }
    .carro {
      flex: 1 1 160px;
      padding: 18px;
      background-color: #e3f2fd;
      border: 1px solid #bbdefb;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
      color: #0d47a1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }
    .carro:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gestor de Frota</h1>
    <p class="subtitulo">Concessionária Digital</p>

    <label for="marca">Marca:</label>
    <input type="text" id="marca" placeholder="Ex: Toyota" onkeyup="atualizarPreview()">

    <label for="modelo">Modelo:</label>
    <input type="text" id="modelo" placeholder="Ex: Corolla">

    <label for="ano">Ano:</label>
    <input type="number" id="ano" placeholder="Ex: 2026">

    <p id="preview">Digite a marca para ver o preview...</p>

    <button onclick="fabricarCarro()">Fabricar Carro</button>

    <h2 class="titulo-patio">Pátio de Veículos</h2>
    <div id="patio"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
